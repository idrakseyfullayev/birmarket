<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azerra - Premium Ev və Məişət Texnikası</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #FCFBFA;
            color: #2D2D2D;
            font-family: 'Poppins', sans-serif;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: #1A1A1A;
            margin-bottom: 8px;
        }

        header p {
            font-size: 1rem;
            color: #8C847E;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
        }

        .search-container {
            max-width: 500px;
            margin: 0 auto 45px auto;
        }

        .search-input {
            width: 100%;
            padding: 16px 25px;
            font-size: 1rem;
            border-radius: 30px;
            border: 1px solid #E5E0DA;
            background: #FFFFFF;
            color: #2D2D2D;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
            font-family: 'Poppins', sans-serif;
        }

        .search-input::placeholder {
            color: #A69F98;
        }

        .search-input:focus {
            border-color: #D4AF37;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.15);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        @media (max-width: 1024px) {
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 20px 10px;
            }
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            .product-card {
                height: auto !important;
                padding: 12px !important;
            }
            .product-img-box {
                height: 110px !important;
                margin-bottom: 8px !important;
            }
            .product-title {
                font-size: 0.85rem !important;
            }
            .status-badge {
                padding: 8px 0 !important;
                font-size: 0.8rem !important;
            }
            
            .single-product-layout {
                grid-template-columns: 1fr !important;
                gap: 20px !important;
                padding: 20px !important;
            }
            .single-img-area {
                height: 280px !important;
            }
            .single-main-title {
                font-size: 1.4rem !important;
            }
            .action-buttons-wrapper {
                flex-direction: column;
                gap: 10px !important;
            }
        }

        .product-card {
            background: #FFFFFF;
            border: 1px solid #F2EFEA;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.02);
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 345px;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(140, 132, 126, 0.12);
            border-color: #E5E0DA;
        }

        .product-img-box {
            width: 100%;
            height: 150px;
            background: #FAFAFA;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .product-img-box img {
            width: 90%;
            height: 90%;
            object-fit: contain;
            transition: transform 0.4s ease;
        }

        .product-card:hover .product-img-box img {
            transform: scale(1.05);
        }

        .product-category {
            font-size: 0.60rem;
            text-transform: uppercase;
            color: #A69F98;
            letter-spacing: 1px;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .product-title {
            font-size: 1.05rem;
            font-weight: 800;
            color: #333333;
            line-height: 1.4;
            display: block;
            text-align: center;
            margin-bottom: 5px;
        }

        .title-id-badge {
            display: inline-block;
            font-size: 0.7rem;
            color: #0c0101;
            font-weight: 400;
            padding: 2px 7px;
            border-radius: 8px;
            line-height: 1.2;
            box-shadow: 0 1px 4px rgba(212, 175, 55, 0.15);
            margin-top: 5px;
        }

        .status-badge {
            display: inline-block;
            padding: 12px 0;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: 500;
            background: #1A1A1A;
            color: #FFFFFF;
            width: 100%;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .product-card:hover .status-badge {
            background: #D4AF37;
            color: #FFFFFF;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        .hidden {
            display: none !important;
        }

        .loading-text {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 1.2rem;
            color: #8C847E;
            padding: 50px 0;
        }

        /* --- PROFESSIONAL MƏHSUL SƏHİFƏSİ --- */
        .back-btn {
            display: inline-flex;
            align-items: center;
            background: transparent;
            border: 1px solid #E5E0DA;
            padding: 10px 22px;
            border-radius: 30px;
            font-size: 0.9rem;
            color: #2D2D2D;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .back-btn:hover {
            border-color: #1A1A1A;
            background: #1A1A1A;
            color: #FFFFFF;
        }

        .single-product-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            max-width: 1100px;
            margin: 0 auto;
            background: #FFFFFF;
            border: 1px solid #F2EFEA;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.01);
        }

        .single-img-area {
            width: 100%;
            height: 420px;
            background: #FAFAFA;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px solid #F2EFEA;
        }

        .single-img-area img {
            width: 85%;
            height: 85%;
            object-fit: contain;
        }

        .single-info-area {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .single-meta-cat {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #A69F98;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .single-main-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #1A1A1A;
            line-height: 1.3;
            margin-bottom: 12px;
        }

        .single-code-badge {
            align-self: flex-start;
            font-size: 0.8rem;
            color: #8C847E;
            background: #FCFBFA;
            border: 1px solid #E5E0DA;
            padding: 4px 12px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .single-commerce-box {
            border-top: 1px solid #F2EFEA;
            border-bottom: 1px solid #F2EFEA;
            padding: 20px 0;
            margin-bottom: 25px;
        }

        .stock-status {
            font-size: 0.85rem;
            color: #2e7d32;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 10px;
        }

        .stock-status::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #2e7d32;
            border-radius: 50%;
        }

        .delivery-info {
            font-size: 0.85rem;
            color: #8C847E;
            line-height: 1.6;
        }

        .delivery-info strong {
            color: #2D2D2D;
        }

        .action-buttons-wrapper {
            display: flex;
            gap: 15px;
        }

        /* Premium Həll: WhatsApp düyməsi ana səhifə dizaynı ilə uyğunlaşdırıldı */
        .btn-whatsapp {
            flex: 1;
            padding: 16px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            background: #1A1A1A;
            color: #FFFFFF;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 0.5px;
            text-decoration: none;
            display: inline-block;
        }

        .btn-whatsapp:hover {
            background: #D4AF37;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }
    </style>
</head>
<body>

    <!-- KATALOQ SƏHİFƏSİ -->
    <div id="catalogView">
        <header>
            <h1>Azerra</h1>
            <p>Premium Ev və Məişət Texnikası</p>
        </header>

        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Məhsul adı və ya KOD ilə axtarış..." oninput="liveSearch()">
        </div>

        <div class="products-grid" id="katalog">
            <div class="loading-text">Məhsullar yüklənir...</div>
        </div>
    </div>

    <!-- PEŞƏKAR WHATSAPP SİSTEMLİ MƏHSUL SƏHİFƏSİ -->
    <div id="productView" class="hidden">
        <div style="max-width: 1100px; margin: 0 auto;">
            <button class="back-btn" onclick="showCatalog()">← Kataloqa Qayıt</button>
        </div>
        
        <div class="single-product-layout">
            <!-- Sol tərəf: Məhsul Şəkli -->
            <div class="single-img-area">
                <img id="singleImg" src="" alt="">
            </div>
            
            <!-- Sağ tərəf: İnformasiya Paneli -->
            <div class="single-info-area">
                <div class="single-meta-cat" id="singleCategory"></div>
                <h2 class="single-main-title" id="singleTitle"></h2>
                <div class="single-code-badge" id="singleCode"></div>
                
                <div class="single-commerce-box">
                    <div class="stock-status">Stokda var</div>
                    <div class="delivery-info">
                        Məhsulu sifariş etmək üçün aşağıdakı düyməyə klikləyərək <strong>WhatsApp</strong> vasitəsilə bizimlə əlaqə saxlayın.<br>
                        • Canlı baxış • Sürətli çatdırılma • Rəsmi zəmanət
                    </div>
                </div>

                <div class="action-buttons-wrapper">
                    <!-- WhatsApp birbaşa əlaqə link düyməsi -->
                    <a href="#" id="whatsappLinkBtn" target="_blank" class="btn-whatsapp">WhatsApp ilə Sifariş Et (+994 51 393 36 31)</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const sheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTh3aquTDV5zBLhxHhzvn14PcpvHJYgYdpytgS7Z7GhSfzXcULgQEUZiW1stCQz-oFg_eWnABfo8CuH/pub?output=csv";
        let allProducts = [];

        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            const result = [];
            
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const row = [];
                let insideQuote = false;
                let entries = "";
                
                for (let j = 0; j < line.length; j++) {
                    let char = line[j];
                    if (char === '"') {
                        insideQuote = !insideQuote;
                    } else if (char === ',' && !insideQuote) {
                        row.push(entries.trim());
                        entries = "";
                    } else {
                        entries += char;
                    }
                }
                row.push(entries.trim());
                
                if (row.length >= 4) {
                    let rawId = row[4] ? row[4].replace(/^"|"$/g, '').trim() : "";
                    
                    result.push({
                        name: row[0].replace(/^"|"$/g, '').trim(),
                        category: row[1].replace(/^"|"$/g, '').trim(),
                        link: row[2].replace(/^"|"$/g, '').trim(),
                        image: row[3].replace(/^"|"$/g, '').trim(),
                        id: rawId
                    });
                }
            }
            return result;
        }

        async function loadProductsFromSheet() {
            const catalogGrid = document.getElementById('katalog');
            
            try {
                const response = await fetch(sheetCsvUrl + "&t=" + new Date().getTime());
                if (!response.ok) throw new Error('Məlumat bazasına qoşulmaq alınmadı');
                
                const csvText = await response.text();
                allProducts = parseCSV(csvText);
                
                catalogGrid.innerHTML = ''; 

                if (allProducts.length === 0) {
                    catalogGrid.innerHTML = '<div class="loading-text">Kataloq hazırda boşdur.</div>';
                    return;
                }

                allProducts.forEach((product, index) => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    
                    card.setAttribute('data-search', `${product.name.toLowerCase()} ${product.id.toLowerCase()}`);

                    const idBadgeHtml = product.id ? `<div><span class="title-id-badge">Məhsul kodu: ${product.id}</span></div>` : '';

                    card.innerHTML = `
                        <div>
                            <div class="product-img-box">
                                <img src="${product.image}" alt="${product.name}" onerror="this.src='https://placehold.co/400x400?text=Azerra'">
                            </div>
                            <div class="product-category">${product.category}</div>
                            <div class="product-title">${product.name}</div>
                            ${idBadgeHtml}
                        </div>
                        <div><span class="status-badge">Məhsula Bax</span></div>
                    `;
                    
                    card.onclick = function() {
                        showProductPage(index);
                    };
                    
                    catalogGrid.appendChild(card);
                });

                checkRoute();

            } catch (error) {
                console.error("Xəta:", error);
                catalogGrid.innerHTML = '<div class="loading-text" style="color: red;">Məlumatları yükləyərkən xəta baş verdi.</div>';
            }
        }

        function showProductPage(index) {
            const product = allProducts[index];
            if (!product) return;

            document.getElementById('singleImg').src = product.image;
            document.getElementById('singleImg').onerror = function() {
                this.src = 'https://placehold.co/400x400?text=Azerra';
            };
            document.getElementById('singleCategory').innerText = product.category;
            document.getElementById('singleTitle').innerText = product.name;
            
            const codeBadge = document.getElementById('singleCode');
            if(product.id) {
                codeBadge.innerText = `Məhsul kodu: ${product.id}`;
                codeBadge.classList.remove('hidden');
            } else {
                codeBadge.classList.add('hidden');
            }

            // Məhsula uyğun avtomatik WhatsApp mesajı formalaşdırılır
            const phoneNumber = "994513933631";
            let messageText = `Salam, bu məhsulu sifariş etmək istəyirəm:\nMəhsul: ${product.name}`;
            if(product.id) {
                messageText += `\nMəhsul kodu: ${product.id}`;
            }
            
            const whatsappUrl = `https://api.whatsapp.com/send?phone=${phoneNumber}&text=${encodeURIComponent(messageText)}`;
            document.getElementById('whatsappLinkBtn').href = whatsappUrl;

            document.getElementById('catalogView').classList.add('hidden');
            document.getElementById('productView').classList.remove('hidden');
            
            window.location.hash = `mehsul-${index}`;
            window.scrollTo(0, 0);
        }

        function showCatalog() {
            document.getElementById('productView').classList.add('hidden');
            document.getElementById('catalogView').classList.remove('hidden');
            history.pushState("", document.title, window.location.pathname + window.location.search);
        }

        function checkRoute() {
            const hash = window.location.hash;
            if (hash.startsWith('#mehsul-')) {
                const index = parseInt(hash.replace('#mehsul-', ''));
                if (!isNaN(index) && allProducts[index]) {
                    showProductPage(index);
                } else {
                    showCatalog();
                }
            } else {
                showCatalog();
            }
        }

        function liveSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const cards = document.querySelectorAll('.product-card');

            cards.forEach(card => {
                const searchContent = card.getAttribute('data-search');
                if (searchContent.includes(query)) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });
        }

        window.addEventListener('DOMContentLoaded', loadProductsFromSheet);
        window.addEventListener('hashchange', checkRoute);
    </script>

</body>
</html>
