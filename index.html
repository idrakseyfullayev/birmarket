<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azerra - Premium Ev və Məişət Texnikası</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #FCFBFA;
            color: #2D2D2D;
            font-family: 'Poppins', sans-serif;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: #1A1A1A;
            margin-bottom: 8px;
        }

        header p {
            font-size: 1rem;
            color: #8C847E;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
        }

        .search-container {
            max-width: 500px;
            margin: 0 auto 45px auto;
        }

        .search-input {
            width: 100%;
            padding: 16px 25px;
            font-size: 1rem;
            border-radius: 30px;
            border: 1px solid #E5E0DA;
            background: #FFFFFF;
            color: #2D2D2D;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
            font-family: 'Poppins', sans-serif;
        }

        .search-input::placeholder {
            color: #A69F98;
        }

        .search-input:focus {
            border-color: #D4AF37;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.15);
        }

        /* ------------------------------------ */
        /* KOMPÜTER ÜÇÜN ÖLÇÜLƏR (ƏSAS CSS)    */
        /* ------------------------------------ */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* Yan-yana 4 ədəd */
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .product-card {
            background: #FFFFFF;
            border: 1px solid #F2EFEA;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.02);
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 290px; /* Kompüterdə normal hündürlük */
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(140, 132, 126, 0.12);
            border-color: #E5E0DA;
        }

        .product-img-box {
            width: 100%;
            height: 110px; /* Kompüterdə şəkil ölçüsü */
            background: #FAFAFA;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .product-img-box img {
            width: 85%;
            height: 85%;
            object-fit: contain;
            transition: transform 0.4s ease;
        }

        .product-card:hover .product-img-box img {
            transform: scale(1.05);
        }

        .product-category {
            font-size: 0.6rem;
            text-transform: uppercase;
            color: #A69F98;
            letter-spacing: 1px;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .product-title {
            font-size: 0.95rem;
            font-weight: 800;
            color: #333333;
            line-height: 1.3;
            display: block;
            text-align: center;
            margin-bottom: 4px;
        }

        .title-id-badge {
            display: inline-block;
            font-size: 0.65rem;
            color: #0c0101;
            font-weight: 400;
            padding: 2px 7px;
            border-radius: 8px;
            line-height: 1.2;
            box-shadow: 0 1px 4px rgba(212, 175, 55, 0.15);
            margin-top: 2px;
        }

        .status-badge {
            display: inline-block;
            padding: 10px 0;
            border-radius: 25px;
            font-size: 0.85rem;
            font-weight: 500;
            background: #1A1A1A;
            color: #FFFFFF;
            width: 100%;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .product-card:hover .status-badge {
            background: #D4AF37;
            color: #FFFFFF;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        .hidden {
            display: none !important;
        }

        .loading-text {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 1.2rem;
            color: #8C847E;
            padding: 50px 0;
        }

        /* ------------------------------------ */
        /* TELEFON ÜÇÜN TAM FERQLİ ÖLÇÜLƏR     */
        /* ------------------------------------ */
        @media (max-width: 600px) {
            body {
                padding: 20px 10px; /* Telefonun kənarlarındakı boşluq azaldı */
            }
            header h1 {
                font-size: 2rem;
            }
            header p {
                font-size: 0.8rem;
            }
            .products-grid {
                grid-template-columns: repeat(4, 1fr); /* Telefonda da yan-yana 4 dənə sığışır */
                gap: 8px; /* Kartların arası sıxlaşır */
            }
            .product-card {
                padding: 6px; /* Daxili boşluq kiçilir */
                border-radius: 10px;
                height: 185px; /* Kartın ümumi hündürlüyü telefona uyğunlaşır */
            }
            .product-img-box {
                height: 60px; /* Şəkillər kiçilir */
                border-radius: 8px;
                margin-bottom: 5px;
            }
            .product-category {
                font-size: 0.5rem;
                letter-spacing: 0;
                margin-bottom: 2px;
            }
            .product-title {
                font-size: 0.6rem; /* Yazı şrifti kiçilir */
                line-height: 1.1;
                margin-bottom: 2px;
                display: -webkit-box;
                -webkit-line-clamp: 2; /* Maksimum 2 sətir yazı */
                -webkit-box-orient: vertical;
                overflow: hidden;
            }
            .title-id-badge {
                font-size: 0.45rem;
                padding: 1px 3px;
                border-radius: 4px;
            }
            .status-badge {
                padding: 5px 0;
                font-size: 0.55rem;
                border-radius: 12px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Azerra</h1>
        <p>Birmarket-də Rəsmi Mağazamız</p>
    </header>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="Məhsul adı və ya KOD ilə axtarış..." oninput="liveSearch()">
    </div>

    <div class="products-grid" id="katalog">
        <div class="loading-text">Məhsullar yüklənir...</div>
    </div>

    <script>
        const sheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTh3aquTDV5zBLhxHhzvn14PcpvHJYgYdpytgS7Z7GhSfzXcULgQEUZiW1stCQz-oFg_eWnABfo8CuH/pub?output=csv";

        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            const result = [];
            
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const row = [];
                let insideQuote = false;
                let entries = "";
                
                for (let j = 0; j < line.length; j++) {
                    let char = line[j];
                    if (char === '"') {
                        insideQuote = !insideQuote;
                    } else if (char === ',' && !insideQuote) {
                        row.push(entries.trim());
                        entries = "";
                    } else {
                        entries += char;
                    }
                }
                row.push(entries.trim());
                
                if (row.length >= 4) {
                    let rawId = row[4] ? row[4].replace(/^"|"$/g, '').trim() : "";
                    
                    result.push({
                        name: row[0].replace(/^"|"$/g, '').trim(),
                        category: row[1].replace(/^"|"$/g, '').trim(),
                        link: row[2].replace(/^"|"$/g, '').trim(),
                        image: row[3].replace(/^"|"$/g, '').trim(),
                        id: rawId
                    });
                }
            }
            return result;
        }

        async function loadProductsFromSheet() {
            const catalogGrid = document.getElementById('katalog');
            
            try {
                const response = await fetch(sheetCsvUrl + "&t=" + new Date().getTime());
                if (!response.ok) throw new Error('Məlumat bazasına qoşulmaq alınmadı');
                
                const csvText = await response.text();
                const products = parseCSV(csvText);
                
                catalogGrid.innerHTML = ''; 

                if (products.length === 0) {
                    catalogGrid.innerHTML = '<div class="loading-text">Kataloq hazırda boşdur.</div>';
                    return;
                }

                products.forEach(product => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    
                    card.setAttribute('data-search', `${product.name.toLowerCase()} ${product.id.toLowerCase()}`);

                    const idBadgeHtml = product.id ? `<div><span class="title-id-badge">KOD: ${product.id}</span></div>` : '';

                    card.innerHTML = `
                        <div>
                            <div class="product-img-box">
                                <img src="${product.image}" alt="${product.name}" onerror="this.src='https://placehold.co/400x400?text=Azerra'">
                            </div>
                            <div class="product-category">${product.category}</div>
                            <div class="product-title">${product.name}</div>
                            ${idBadgeHtml}
                        </div>
                        <div><span class="status-badge">Bax</span></div>
                    `;
                    
                    card.onclick = function() {
                        window.open(product.link, '_blank');
                    };
                    
                    catalogGrid.appendChild(card);
                });

            } catch (error) {
                console.error("Xəta:", error);
                catalogGrid.innerHTML = '<div class="loading-text" style="color: red;">Məlumatları yükləyərkən xəta baş verdi.</div>';
            }
        }

        function liveSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const cards = document.querySelectorAll('.product-card');

            cards.forEach(card => {
                const searchContent = card.getAttribute('data-search');
                if (searchContent.includes(query)) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });
        }

        window.addEventListener('DOMContentLoaded', loadProductsFromSheet);
    </script>

</body>
</html>
